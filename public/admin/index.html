<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager | Ansh Hedau</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <style>
      /* Minor CMS UI polish - keep default Decap/Netlify CMS theme */
      [class*="ControlPaneContainer"] input:focus,
      [class*="ControlPaneContainer"] textarea:focus {
        border-color: #2196f3 !important;
      }

      /* Better mobile layout */
      @media (max-width: 768px) {
        [class*="ControlPaneContainer"] input,
        [class*="ControlPaneContainer"] textarea,
        [class*="ControlPaneContainer"] select {
          font-size: 16px !important;
        }
      }
    </style>
  </head>
  <body>
    <!-- Use Decap CMS (maintained fork of Netlify CMS) for better UI & mobile support -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
